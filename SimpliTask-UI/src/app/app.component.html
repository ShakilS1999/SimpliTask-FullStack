<div style="max-width: 800px; margin: 30px auto; padding: 20px; font-family: sans-serif;">
  <h1 style="text-align: center;">SimpliTask Management</h1>

  <div style="background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h3>{{ editMode ? 'Edit Task' : 'Add New Task' }}</h3>

    <div *ngIf="!editMode">
      <input type="text" [(ngModel)]="newTask.title" placeholder="Title (Required)" style="width: 100%; padding: 10px; margin-bottom: 10px;">
      <textarea [(ngModel)]="newTask.description" placeholder="Description" style="width: 100%; padding: 10px; margin-bottom: 10px;"></textarea>
    </div>

    <div *ngIf="editMode">
      <input type="text" [(ngModel)]="selectedTask.title" style="width: 100%; padding: 10px; margin-bottom: 10px;">
      <textarea [(ngModel)]="selectedTask.description" style="width: 100%; padding: 10px; margin-bottom: 10px;"></textarea>
    </div>

    <button (click)="saveTask()" style="background: green; color: white; padding: 10px 20px; border: none; cursor: pointer;">
      {{ editMode ? 'Update Task' : 'Save Task' }}
    </button>
    <button *ngIf="editMode" (click)="resetForm()" style="margin-left: 10px;">Cancel</button>
  </div>

  <hr style="margin: 30px 0;">

  <h3>All Tasks</h3>
  <table border="1" style="width: 100%; border-collapse: collapse;">
    <tr style="background: #eee;">
      <th style="padding: 10px;">Done</th>
      <th>Title</th>
      <th>Description</th>
      <th>Actions</th>
    </tr>
    <tr *ngFor="let t of tasks">
      <td style="text-align: center;">
        <input type="checkbox" [(ngModel)]="t.isCompleted" (change)="editTask(t); saveTask()">
      </td>
      <td [style.textDecoration]="t.isCompleted ? 'line-through' : 'none'" style="padding: 10px;">{{t.title}}</td>
      <td style="padding: 10px;">{{t.description}}</td>
      <td style="padding: 10px; text-align: center;">
        <button (click)="editTask(t)" style="color: blue; cursor: pointer;">Edit</button> |
        <button (click)="deleteTask(t.id)" style="color: red; cursor: pointer;">Delete</button>
      </td>
    </tr>
  </table>
</div>
